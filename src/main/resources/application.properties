# Puerto HTTP
quarkus.http.port=8081

# Conexión a PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=root
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/TarjetasCodigos

# Configuración JPA
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
 
# Documentación OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/openapi

# nombre de la API
quarkus.http.root-path=/api/tarjetas/v1

# configuración de cors
quarkus.http.cors=true
#quarkus.http.cors.origins=*
# Cambiar esto en application.properties de tu backend (Quarkus)
quarkus.http.cors.origins=http://localhost:8080
quarkus.http.cors.methods=*
quarkus.http.cors.headers=*

# Configuración del Token
mp.jwt.verify.issuer=tarjetascodigos
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey-pkcs8.pem